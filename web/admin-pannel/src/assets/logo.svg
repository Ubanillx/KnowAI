<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%" style="background: transparent;">
  <defs>
    <linearGradient id="neonWarm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5E62" />
      <stop offset="50%" stop-color="#FF9966" />
      <stop offset="100%" stop-color="#F9D423" />
    </linearGradient>
    
    <filter id="glowEffect" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/> <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#glowEffect)" stroke="url(#neonWarm)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    
    <path d="M 200 110 
             C 150 50, 60 80, 70 160 
             C 80 230, 200 320, 200 320 
             C 200 320, 320 230, 330 160 
             C 340 80, 250 50, 200 110 Z" 
          stroke-width="8" />
    
    <path d="M 100 120 Q 200 200, 200 320" stroke-width="4" />
    <path d="M 300 120 Q 200 200, 200 320" stroke-width="4" />
    <path d="M 75 170 Q 200 100, 325 170" stroke-width="4" />
    <path d="M 130 75 Q 200 180, 270 75" stroke-width="4" />
    
    <circle cx="200" cy="110" r="6" fill="#FFFFFF" stroke-width="3" />
    <circle cx="200" cy="320" r="7" fill="#FFFFFF" stroke-width="3" />
    
    <circle cx="100" cy="120" r="4.5" fill="#FFFFFF" stroke-width="3" />
    <circle cx="300" cy="120" r="4.5" fill="#FFFFFF" stroke-width="3" />
    <circle cx="75" cy="170" r="4.5" fill="#FFFFFF" stroke-width="3" />
    <circle cx="325" cy="170" r="4.5" fill="#FFFFFF" stroke-width="3" />
    <circle cx="130" cy="75" r="4.5" fill="#FFFFFF" stroke-width="3" />
    <circle cx="270" cy="75" r="4.5" fill="#FFFFFF" stroke-width="3" />
    
    <circle cx="200" cy="220" r="5" fill="#FFFFFF" stroke-width="3" />
    <circle cx="200" cy="140" r="5" fill="#FFFFFF" stroke-width="3" />
  </g>
</svg>